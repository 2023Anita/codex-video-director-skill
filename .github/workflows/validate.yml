name: Validate

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Validate repository
        run: python3 scripts/validate_repo.py
      - name: Render demo smoke
        run: node scripts/render-demo.mjs --smoke
